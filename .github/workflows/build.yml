name: Build Stivaros APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get Flutter packages
        run: flutter pub get

      - name: Download Xray binaries for jniLibs
        run: |
          # arm32 (armeabi-v7a)
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          curl -L -o /tmp/xray-arm.zip \
            "https://github.com/XTLS/Xray-core/releases/download/v25.12.8/Xray-linux-arm32-v7a.zip" \
            --connect-timeout 30 --max-time 180
          unzip -p /tmp/xray-arm.zip xray > android/app/src/main/jniLibs/armeabi-v7a/libxray.so
          chmod +x android/app/src/main/jniLibs/armeabi-v7a/libxray.so
          echo "libxray.so (arm32): $(ls -lh android/app/src/main/jniLibs/armeabi-v7a/libxray.so)"

          # arm64 (arm64-v8a)
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          curl -L -o /tmp/xray-arm64.zip \
            "https://github.com/XTLS/Xray-core/releases/download/v25.12.8/Xray-linux-arm64-v8a.zip" \
            --connect-timeout 30 --max-time 180
          unzip -p /tmp/xray-arm64.zip xray > android/app/src/main/jniLibs/arm64-v8a/libxray.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libxray.so
          echo "libxray.so (arm64): $(ls -lh android/app/src/main/jniLibs/arm64-v8a/libxray.so)"

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=debug-info --target-platform android-arm,android-arm64

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stivaros-apks
          path: build/app/outputs/flutter-apk/*.apk
