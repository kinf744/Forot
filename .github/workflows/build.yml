name: Build Stivaros APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Download Xray binaries
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            case "$abi" in
              arm64-v8a) zip_name="Xray-android-arm64-v8a" ;;
              armeabi-v7a) zip_name="Xray-android-arm32-v7a" ;;
              x86_64) zip_name="Xray-android-amd64" ;;
            esac
            mkdir -p "android/app/src/main/jniLibs/$abi"
            wget -q "https://github.com/XTLS/Xray-core/releases/latest/download/${zip_name}.zip" -O "/tmp/xray-$abi.zip"
            unzip -o "/tmp/xray-$abi.zip" xray -d "android/app/src/main/jniLibs/$abi/"
            mv "android/app/src/main/jniLibs/$abi/xray" "android/app/src/main/jniLibs/$abi/libxray.so" 2>/dev/null || true
            rm "/tmp/xray-$abi.zip"
          done

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stivaros-apks
          path: build/app/outputs/flutter-apk/*.apk
