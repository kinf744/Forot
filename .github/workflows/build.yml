name: Build Stivaros APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Download & compress Xray binary
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl binutils-arm-linux-gnueabihf 2>/dev/null
          mkdir -p android/app/src/main/assets/xray
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-arm32-v7a.zip -O /tmp/xray.zip
          unzip -o /tmp/xray.zip xray -d /tmp/
          chmod +x /tmp/xray
          # Strip debug symbols
          arm-linux-gnueabihf-strip /tmp/xray 2>/dev/null || true
          # UPX compress
          upx --lzma --best -o /tmp/xray_upx /tmp/xray 2>/dev/null || cp /tmp/xray /tmp/xray_upx
          mv /tmp/xray_upx android/app/src/main/assets/xray/xray
          rm -f /tmp/xray.zip /tmp/xray
          ls -lh android/app/src/main/assets/xray/

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=debug-info

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stivaros-apks
          path: build/app/outputs/flutter-apk/*.apk
