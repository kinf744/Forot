name: Build Stivaros APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Download Xray binary
        run: |
          mkdir -p android/app/src/main/assets/xray
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip -O /tmp/xray.zip
          unzip -o /tmp/xray.zip xray -d android/app/src/main/assets/xray/
          rm /tmp/xray.zip
          ls -lh android/app/src/main/assets/xray/

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stivaros-apks
          path: build/app/outputs/flutter-apk/*.apk
