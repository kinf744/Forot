name: Build Stivaros APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get Flutter packages
        run: flutter pub get

      - name: Download Xray binary for jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          curl -L -o /tmp/xray.zip \
            "https://github.com/XTLS/Xray-core/releases/download/v25.12.8/Xray-linux-arm32-v7a.zip" \
            --connect-timeout 30 --max-time 180
          unzip -p /tmp/xray.zip xray > android/app/src/main/jniLibs/armeabi-v7a/libxray.so
          chmod +x android/app/src/main/jniLibs/armeabi-v7a/libxray.so
          echo "libxray.so: $(ls -lh android/app/src/main/jniLibs/armeabi-v7a/libxray.so)"

      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build.log

      - name: Show build log
        if: failure()
        run: head -200 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stivaros-apks
          path: build/app/outputs/flutter-apk/*.apk
